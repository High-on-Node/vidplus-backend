name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 104.215.151.48
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e

            # API
            cd ~/extractor-api
            git pull origin main
            npm ci
            pm2 restart extractor-api

            # Admin panel - must rebuild on every deploy
            cd ~/extractor-api/admin
            npm ci
            npm run build
            pm2 restart vidplus-admin

            # Landing page - must rebuild on every deploy
            cd ~/extractor-api/landing
            npm ci
            npm run build
            pm2 restart vidplus-landing

            pm2 save
            pm2 status
            echo "All three apps deployed successfully"
